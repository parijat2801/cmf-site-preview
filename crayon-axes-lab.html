<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crayon Axes Lab</title>
<style>
  :root{--ink:#231F20;--cream:#E7E1D4;--red:#DB1A21}
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--cream);
    font-family:"Helvetica Neue",Arial,sans-serif;display:grid;grid-template-columns:1fr 330px;min-height:100vh}
  .stage{display:flex;align-items:center;justify-content:center;padding:60px;position:relative}

  /* the chart plot: faint grid bg + the two shader-crayon axes */
  .plot{position:relative;width:min(60vw,620px);aspect-ratio:1/.82;
    /* faint graph-paper grid on dark */
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size:var(--grid-size) var(--grid-size);
    --grid-color:rgba(231,225,212,.07); --grid-size:32px}
  .plot canvas{position:absolute;inset:0;width:100%!important;height:100%!important;pointer-events:none}
  .lbl{position:absolute;font-weight:700;font-style:italic;color:var(--cream);opacity:.9;font-size:14px;letter-spacing:.02em}
  .lbl-y{left:-6px;top:44%;transform:rotate(-90deg);transform-origin:left;white-space:nowrap}
  .lbl-x{left:52%;bottom:-26px}

  .replay{position:absolute;top:24px;right:24px;background:none;border:1px solid rgba(231,225,212,.3);
    color:var(--cream);padding:.5em 1.1em;border-radius:4px;cursor:pointer;font-size:12px;letter-spacing:.14em;text-transform:uppercase}

  .panel{background:#1a1718;border-left:1px solid rgba(231,225,212,.12);padding:22px;overflow-y:auto;font-size:13px;position:sticky;top:0;height:100vh}
  .panel h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.6;margin:0 0 16px}
  .ctl{margin-bottom:13px}
  .ctl label{display:flex;justify-content:space-between;margin-bottom:5px;opacity:.85}
  .ctl label b{font-weight:400;opacity:.6;font-variant-numeric:tabular-nums}
  .ctl input[type=range]{width:100%;accent-color:var(--red)}
  .copy{margin-top:12px;width:100%;padding:.7em;background:var(--red);color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:700;letter-spacing:.06em}
  .out{margin-top:12px;background:#0f0d0e;border:1px solid rgba(231,225,212,.12);border-radius:6px;padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;color:#9fd3a0}
</style>
</head>
<body>
  <div class="stage">
    <button class="replay" id="replay">▶ Replay draw</button>
    <div class="plot" id="plot">
      <span class="lbl lbl-y">Meaningful Scale</span>
      <span class="lbl lbl-x">Cultural Impact</span>
    </div>
  </div>

  <div class="panel">
    <h2>Crayon Axes Lab</h2>
    <div class="ctl"><label>Draw speed (s) <b id="v-draw"></b></label><input type="range" id="draw" min="0.4" max="3" step="0.05" value="1.2"></div>
    <div class="ctl"><label>Stroke thickness <b id="v-thick"></b></label><input type="range" id="thick" min="0.008" max="0.3" step="0.004" value="0.06"></div>
    <div class="ctl"><label>Edge roughness <b id="v-rough"></b></label><input type="range" id="rough" min="0" max="1" step="0.02" value="0.55"></div>
    <div class="ctl"><label>Wax grain (holes) <b id="v-grain"></b></label><input type="range" id="grain" min="0" max="1" step="0.02" value="0.5"></div>
    <div class="ctl"><label>Grain scale <b id="v-gscale"></b></label><input type="range" id="gscale" min="4" max="40" step="1" value="18"></div>
    <div class="ctl"><label>Streakiness <b id="v-streak"></b></label><input type="range" id="streak" min="0" max="1" step="0.02" value="0.6"></div>
    <div class="ctl"><label>Ink opacity <b id="v-alpha"></b></label><input type="range" id="alpha" min="0.4" max="1" step="0.02" value="0.92"></div>
    <div class="ctl"><label>Waver (line not straight) <b id="v-waver"></b></label><input type="range" id="waver" min="0" max="0.05" step="0.002" value="0.014"></div>
    <div class="ctl"><label>Grid opacity <b id="v-gridop"></b></label><input type="range" id="gridop" min="0" max="0.2" step="0.005" value="0.07"></div>
    <div class="ctl"><label>Grid size (px) <b id="v-gridsz"></b></label><input type="range" id="gridsz" min="16" max="56" step="2" value="32"></div>

    <button class="copy" id="copyBtn">Copy recipe</button>
    <div class="out" id="out"></div>
  </div>

<script type="module">
  import { ShaderMount } from './vendor/paper-shaders/index.js';
  import { simplexNoise } from './vendor/paper-shaders/shader-utils.js';

  /* CRAYON AXES shader — draws an L-shaped stroke (vertical from bottom up, then
     horizontal from the corner rightward) into a transparent canvas over the plot.
     Crayon = a rough, grainy, waxy stroke: irregular edges, thresholded grain
     "holes" where the wax skipped, streaky density. u_progress 0→1 draws the
     whole L (0..0.5 = the Y axis rising, 0.5..1 = the X axis extending). */
  const frag = `#version 300 es
  precision mediump float;
  uniform float u_time;
  uniform vec2  u_res;
  uniform float u_progress;
  uniform vec3  u_color;
  uniform float u_alpha, u_thick, u_rough, u_grain, u_gscale, u_streak, u_waver;
  out vec4 fragColor;
  ${simplexNoise}

  // distance-based crayon body around an axis line, with rough edge + grain
  float crayon(float d, vec2 nuv, float seed){
    // rough edge: wobble the half-thickness with noise along the stroke
    float edge = u_thick*0.5 * (1.0 + u_rough*0.6*snoise(nuv*7.0 + seed));
    float body = 1.0 - smoothstep(edge*0.6, edge, abs(d));
    if(body<=0.0) return 0.0;
    // streaky density along the stroke
    float dens = 1.0 - u_streak*(0.5+0.5*snoise(nuv*vec2(3.0,22.0)+seed));
    // waxy grain: crayon doesn't lay down solid — noise thresholds the ink so
    // "skips" appear. u_grain drives BOTH how many holes (lower threshold as it
    // rises) AND how deep they cut, so it's visible across the whole 0→1 range.
    float g = 0.5 + 0.5*snoise(nuv*u_gscale + seed*2.7);   // remap noise to 0..1
    // threshold slides from ~1.0 (no holes) down to ~0.15 (lots) as u_grain rises
    float thr = mix(1.02, 0.15, u_grain);
    float grain = smoothstep(thr-0.18, thr+0.05, g);       // 0 in a hole, 1 solid
    return clamp(body*dens*grain,0.0,1.0);
  }

  void main(){
    vec2 uv = gl_FragCoord.xy / u_res.xy; uv.y = 1.0 - uv.y;   // 0,0 top-left
    float aspect = u_res.x/u_res.y;
    vec2 nuv = vec2(uv.x*aspect, uv.y);

    // axis geometry: L rooted at bottom-left corner (x0, y1)
    float x0 = 0.10;         // vertical axis x-position
    float y1 = 0.90;         // horizontal axis y-position (near bottom)
    // waver: axes aren't perfectly straight
    float xw = x0 + u_waver*snoise(vec2(uv.y*6.0, 2.3));
    float yw = y1 + u_waver*snoise(vec2(uv.x*6.0, 8.1));

    // progress split: first half draws Y (bottom→top), second half draws X (left→right)
    float pY = clamp(u_progress/0.5, 0.0, 1.0);
    float pX = clamp((u_progress-0.5)/0.5, 0.0, 1.0);

    float ink = 0.0;
    // vertical axis: exists for uv.y in [y1 down..], drawn from bottom (y1) UP to (y1 - pY*range)
    if(uv.x < x0+0.2){
      float dV = (uv.x - xw)*aspect;
      float topY = y1 - pY*(y1-0.06);           // current top of the rising line
      float alongV = step(topY, uv.y) * step(uv.y, y1+0.02);
      if(alongV>0.5) ink = max(ink, crayon(dV, nuv, 1.0));
    }
    // horizontal axis: from the corner (x0) rightward to x0 + pX*range
    if(uv.y > y1-0.2){
      float dH = (uv.y - yw);
      float rightX = x0 + pX*(0.94-x0);
      float alongH = step(x0-0.02, uv.x) * step(uv.x, rightX);
      if(alongH>0.5) ink = max(ink, crayon(dH, nuv, 5.0));
    }

    if(ink<=0.001){ fragColor=vec4(0.0); return; }
    fragColor = vec4(u_color, ink*u_alpha);
  }`;

  const P={draw:1.2,thick:0.14,rough:0.55,grain:0.5,gscale:18,streak:0.6,alpha:0.92,waver:0.014,gridop:0.07,gridsz:32,
    color:[0.859,0.102,0.129]};   // brand red

  // on-screen error box so shader/JS failures are visible without the console
  function showErr(msg){
    let b=document.getElementById('errbox');
    if(!b){ b=document.createElement('div'); b.id='errbox';
      b.style.cssText='position:fixed;left:12px;bottom:12px;max-width:60vw;z-index:9999;background:#3a0d0d;color:#ffb4b4;border:1px solid #a33;padding:10px 14px;border-radius:6px;font:12px ui-monospace,Menlo,monospace;white-space:pre-wrap';
      document.body.appendChild(b); }
    b.textContent='ERROR: '+msg;
  }
  addEventListener('error',e=>showErr(e.message+' @ '+(e.filename||'')+':'+e.lineno));
  addEventListener('unhandledrejection',e=>showErr('promise: '+(e.reason&&e.reason.message||e.reason)));

  let cv=null;
  function uni(p){ return {u_res:[cv?cv.width:600,cv?cv.height:500],u_progress:p,u_color:P.color,
    u_alpha:P.alpha,u_thick:P.thick,u_rough:P.rough,u_grain:P.grain,u_gscale:P.gscale,u_streak:P.streak,u_waver:P.waver}; }

  const plot=document.getElementById('plot');
  let mount;
  try{
    mount=new ShaderMount(plot, frag, uni(0), undefined, 0.0);
    cv=plot.querySelector('canvas');
    if(!cv) showErr('no canvas created by ShaderMount');
  }catch(err){ showErr('mount failed: '+(err&&err.message||err)); throw err; }

  let raf=0,start=0;
  function draw(now){ if(!start)start=now; const p=Math.min(1,(now-start)/(P.draw*1000));
    mount.setUniforms(uni(p)); if(p<1)raf=requestAnimationFrame(draw); }
  function replay(){ cancelAnimationFrame(raf); start=0; raf=requestAnimationFrame(draw); }
  document.getElementById('replay').addEventListener('click',replay);
  function stat(){ mount.setUniforms(uni(1)); }

  const bind=id=>{ const el=document.getElementById(id); const set=()=>{
    P[id]=parseFloat(el.value); const l=document.getElementById('v-'+id); if(l)l.textContent=P[id];
    if(id==='gridop') plot.style.setProperty('--grid-color',`rgba(231,225,212,${P.gridop})`);
    if(id==='gridsz') plot.style.setProperty('--grid-size',P.gridsz+'px');
    render(); stat();
  }; el.addEventListener('input',set); set(); };
  ['draw','thick','rough','grain','gscale','streak','alpha','waver','gridop','gridsz'].forEach(bind);

  function render(){ document.getElementById('out').textContent=
`/* crayon axes recipe */
draw:${P.draw} thick:${P.thick} rough:${P.rough}
grain:${P.grain} gscale:${P.gscale} streak:${P.streak}
alpha:${P.alpha} waver:${P.waver}
grid: op ${P.gridop} size ${P.gridsz}px`; }
  document.getElementById('copyBtn').addEventListener('click',()=>{
    navigator.clipboard.writeText(document.getElementById('out').textContent);
    document.getElementById('copyBtn').textContent='Copied ✓';
    setTimeout(()=>document.getElementById('copyBtn').textContent='Copy recipe',1200);
  });

  render(); setTimeout(replay,400);
  addEventListener('resize',stat);
</script>
</body>
</html>
