<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Highlighter Lab — Cultural Misfits</title>
<style>
  /* --reveal is the wipe position (0%→100%) of the marker tip. Registering it as
     a real animatable <percentage> lets it transition — a plain custom prop can't
     be tweened. The fill is painted FIXED; only this wipe moves, so streaks and
     bubbles are already in place and get UNCOVERED, not stretched. */
  @property --reveal{ syntax:'<percentage>'; inherits:true; initial-value:0%; }

  :root{
    --ink:#231F20; --cream:#E7E1D4; --red:#DB1A21; --yellow:#F5D547;
    --reveal:0%;            /* wipe position; .go animates it to 100% */
    /* ---- tunable knobs (driven by the sliders) ---- */
    --draw:1.1s;            /* how long the stroke takes to sweep */
    --ease:cubic-bezier(.22,1,.36,1);
    --wet-boost:0.55;       /* extra brightness at the wet tip (0 = off) */
    --wet-width:22%;        /* width of the bright wet band at the leading edge */
    --wet-lag:8%;           /* how far BEHIND the tip the sheen trails (color first) */
    --dry-delay:0.35s;      /* how long after the tip passes before ink 'dries' */
    --streak:0.10;          /* lengthwise streak strength (alpha) */
    --streak-gap:7px;       /* streak spacing */
    --bubbles:1;            /* 0/1 toggle for skipped bubbles */
    --ragged:0.9;           /* edge jitter amount (px feeds the polygon) */
    --skew:6%;              /* corner skew of the stroke wedge */
    --hl:var(--red);        /* highlighter color */
    --overhang:.14em;       /* how far the ink bleeds past the word L/R */
    --thick-top:10%;        /* ink box inset from top */
    --thick-bot:8%;         /* ink box inset from bottom */
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--cream);
    font-family:"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;
    display:grid;grid-template-columns:1fr 340px;min-height:100vh}

  /* ---------- STAGE (mimics the for-brands dark card) ---------- */
  .stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;
    padding:60px;position:relative}
  .stage h1{font-size:14px;letter-spacing:.2em;text-transform:uppercase;opacity:.5;font-weight:700;margin:0}
  .sample{font-weight:800;letter-spacing:-.01em;font-size:clamp(2rem,5vw,3.4rem);white-space:nowrap}
  .note{font-family:'Caveat',cursive;color:var(--red);transform:rotate(-3deg);font-size:1.4rem;opacity:.9}

  /* replay button */
  .replay{position:absolute;top:24px;right:24px;background:none;border:1px solid rgba(231,225,212,.3);
    color:var(--cream);padding:.5em 1.1em;border-radius:4px;cursor:pointer;font-size:12px;
    letter-spacing:.14em;text-transform:uppercase}
  .replay:hover{border-color:var(--cream)}

  /* =========================================================
     THE HIGHLIGHTER  (.mark)  — REVEAL model, not stretch.
     The ink is painted at FULL width and never scales. A wipe mask driven by
     --reveal (0%→100%) uncovers it left→right, so streaks + bubbles are already
     in their final places and simply get exposed as the tip passes — the way a
     marker actually lays ink down.
     - .mark::before = the ink (streaky fill + ragged edge), wipe-masked + bubble-masked
     - .mark::after  = the WET bright band, parked AT the wipe edge, following the tip
     ========================================================= */
  .mark{position:relative;display:inline-block;color:inherit;z-index:0;isolation:isolate;
    transition:--reveal var(--draw) var(--ease), color .3s var(--ease) var(--dry-delay)}

  /* the ink — FIXED size, revealed by a moving wipe mask */
  .mark::before{content:"";position:absolute;left:calc(-1*var(--overhang));right:calc(-1*var(--overhang));
    top:var(--thick-top);bottom:var(--thick-bot);z-index:-2;border-radius:3px;
    /* streaky felt-tip ink: base color + faint lengthwise darker streaks */
    background:
      repeating-linear-gradient(92deg,
        rgba(0,0,0,var(--streak)) 0 1px,
        transparent 1px var(--streak-gap)),
      var(--hl);
    /* ragged, non-parallel edge via a many-point polygon (skew + jitter) */
    clip-path:polygon(
      0% calc(var(--skew) + 0px),
      12% 2%, 26% 5%, 39% 1%, 52% 4%, 68% 1%, 81% 5%, 94% 2%, 100% var(--skew),
      100% calc(100% - var(--skew)),
      88% 98%, 73% 95%, 61% 99%, 47% 96%, 33% 99%, 19% 95%, 7% 98%,
      0% calc(100% - var(--skew))
    );
    /* TWO masks intersected: (1) the WIPE — opaque left of --reveal, a short soft
       tip band, then transparent; (2) the fixed BUBBLES. A pixel shows only if it
       is behind the tip AND not a bubble. The wipe moves; the bubbles don't. */
    -webkit-mask:var(--wipe-mask), var(--bubble-mask);
    mask:var(--wipe-mask), var(--bubble-mask);
    -webkit-mask-composite:source-in;
    mask-composite:intersect;
    --wipe-mask:linear-gradient(90deg,
      #000 0 var(--reveal),
      rgba(0,0,0,.55) calc(var(--reveal) + 2%),
      transparent calc(var(--reveal) + 5%));
    --bubble-mask:
      radial-gradient(circle at 18% 62%, transparent calc(3px*var(--bubbles)), #000 calc(3.6px*var(--bubbles))),
      radial-gradient(circle at 44% 35%, transparent calc(2.2px*var(--bubbles)), #000 calc(2.8px*var(--bubbles))),
      radial-gradient(circle at 63% 70%, transparent calc(3.4px*var(--bubbles)), #000 calc(4px*var(--bubbles))),
      radial-gradient(circle at 79% 44%, transparent calc(2px*var(--bubbles)), #000 calc(2.6px*var(--bubbles))),
      radial-gradient(circle at 91% 66%, transparent calc(2.6px*var(--bubbles)), #000 calc(3.2px*var(--bubbles)));
    transition:none;   /* the ink itself never transitions; --reveal does the work */
  }

  /* wet bright band — a brighter wash confined to the EXACT stroke shape. It spans
     the same box + ragged clip + bubble mask as the ink, but a travelling wipe
     limits its brightness to a band riding the tip (from just behind --reveal to
     the tip). It fades to nothing as the ink dries, so no glow is ever left over. */
  .mark::after{content:"";position:absolute;pointer-events:none;z-index:-1;
    left:calc(-1*var(--overhang));right:calc(-1*var(--overhang));
    top:var(--thick-top);bottom:var(--thick-bot);border-radius:3px;
    background:linear-gradient(90deg, color-mix(in srgb, var(--hl) 45%, white), color-mix(in srgb, var(--hl) 20%, white));
    mix-blend-mode:screen;opacity:0;
    /* SAME ragged outline as the ink so the wet edge is the stroke's shape */
    clip-path:polygon(
      0% calc(var(--skew) + 0px),
      12% 2%, 26% 5%, 39% 1%, 52% 4%, 68% 1%, 81% 5%, 94% 2%, 100% var(--skew),
      100% calc(100% - var(--skew)),
      88% 98%, 73% 95%, 61% 99%, 47% 96%, 33% 99%, 19% 95%, 7% 98%,
      0% calc(100% - var(--skew))
    );
    /* band-at-the-tip wipe (bright only near --reveal) ∩ same bubbles as the ink */
    -webkit-mask:var(--wet-wipe), var(--bubble-mask);
    mask:var(--wet-wipe), var(--bubble-mask);
    -webkit-mask-composite:source-in;mask-composite:intersect;
    /* the sheen LAGS the tip: the color must land first, THEN the wet gloss shows
       on it. So the band's leading edge stops --wet-lag BEHIND --reveal (never at
       the tip, never on bare paper), peaks a little further back, and fades out
       deeper still as that ink dries. */
    --wet-wipe:linear-gradient(90deg,
      transparent calc(var(--reveal) - var(--wet-lag) - var(--wet-width)),
      #000 calc(var(--reveal) - var(--wet-lag) - (var(--wet-width) * 0.4)),
      rgba(0,0,0,.5) calc(var(--reveal) - var(--wet-lag)),
      transparent calc(var(--reveal) - var(--wet-lag) + 1%));
    transition:none;
  }

  /* ---- fire state: animate ONLY --reveal (the tip position) ----
     --reveal is registered + inherits, so animating it on .mark (transition set in
     the base rule) cascades into both pseudo-elements — the wipe mask and the wet
     band's mask both read it live. */
  .go .mark{--reveal:100%; color:var(--cream)}
  .go .mark::after{
    opacity:var(--wet-boost);
    animation:wetfade var(--draw) var(--ease) forwards;
  }
  @keyframes wetfade{
    0%{opacity:0}
    14%{opacity:var(--wet-boost)}
    80%{opacity:var(--wet-boost)}
    100%{opacity:0}
  }

  /* during a replay reset, kill transitions so the stroke SNAPS to zero width
     (no slow shrink-back) before the fresh draw fires next frame */
  .resetting .mark, .resetting .mark::before, .resetting .mark::after{transition:none !important}

  /* ---------- CONTROL PANEL ---------- */
  .panel{background:#1a1718;border-left:1px solid rgba(231,225,212,.12);padding:22px;overflow-y:auto;
    font-size:13px;position:sticky;top:0;height:100vh}
  .panel h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.6;margin:0 0 16px}
  .ctl{margin-bottom:15px}
  .ctl label{display:flex;justify-content:space-between;margin-bottom:5px;opacity:.85}
  .ctl label b{font-weight:400;opacity:.6;font-variant-numeric:tabular-nums}
  .ctl input[type=range]{width:100%;accent-color:var(--red)}
  .ctl.toggle{display:flex;align-items:center;gap:10px}
  .row{display:flex;gap:10px}
  .swatches{display:flex;gap:8px;margin-bottom:16px}
  .swatches button{flex:1;height:30px;border:1px solid rgba(231,225,212,.2);border-radius:4px;cursor:pointer}
  .out{margin-top:18px;background:#0f0d0e;border:1px solid rgba(231,225,212,.12);border-radius:6px;
    padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.5;
    white-space:pre-wrap;color:#9fd3a0;max-height:34vh;overflow:auto}
  .copy{margin-top:10px;width:100%;padding:.7em;background:var(--red);color:#fff;border:none;border-radius:5px;
    cursor:pointer;font-weight:700;letter-spacing:.06em}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <button class="replay" id="replay">▶ Replay draw</button>
    <h1>For Brands · quadrant label</h1>
    <div class="sample go">The <span class="mark" id="mark">Cultural Leaders</span> quadrant</div>
    <div class="note">If your brand isn't here, is it even culturally relevant?</div>
    <div class="sample go" style="font-size:1.6rem;opacity:.7">smaller: <span class="mark">Made Real</span> · <span class="mark">work with</span></div>
  </div>

  <div class="panel">
    <h2>Highlighter Lab</h2>

    <div class="swatches">
      <button style="background:#DB1A21" data-color="var(--red)" title="red"></button>
      <button style="background:#F5D547" data-color="var(--yellow)" title="yellow"></button>
      <button style="background:#4ea3ff" data-color="#4ea3ff" title="blue"></button>
      <button style="background:#5ed17a" data-color="#5ed17a" title="green"></button>
    </div>

    <div class="ctl"><label>Draw speed <b id="v-draw"></b></label><input type="range" id="draw" min="0.3" max="2.5" step="0.05"></div>
    <div class="ctl"><label>Wet-edge brightness <b id="v-wet-boost"></b></label><input type="range" id="wet-boost" min="0" max="1" step="0.05"></div>
    <div class="ctl"><label>Wet band width <b id="v-wet-width"></b></label><input type="range" id="wet-width" min="8" max="45" step="1"></div>
    <div class="ctl"><label>Wet lag (behind tip) <b id="v-wet-lag"></b></label><input type="range" id="wet-lag" min="0" max="30" step="1"></div>
    <div class="ctl"><label>Dry delay <b id="v-dry-delay"></b></label><input type="range" id="dry-delay" min="0" max="1.2" step="0.05"></div>
    <div class="ctl"><label>Streak strength <b id="v-streak"></b></label><input type="range" id="streak" min="0" max="0.35" step="0.01"></div>
    <div class="ctl"><label>Streak gap <b id="v-streak-gap"></b></label><input type="range" id="streak-gap" min="3" max="16" step="1"></div>
    <div class="ctl"><label>Edge raggedness <b id="v-ragged"></b></label><input type="range" id="ragged" min="0" max="3" step="0.1"></div>
    <div class="ctl"><label>Corner skew <b id="v-skew"></b></label><input type="range" id="skew" min="0" max="14" step="0.5"></div>
    <div class="ctl"><label>Ink overhang <b id="v-overhang"></b></label><input type="range" id="overhang" min="0" max="0.35" step="0.01"></div>
    <div class="ctl toggle"><input type="checkbox" id="bubbles" checked><label style="margin:0">Skipped bubbles</label></div>

    <button class="copy" id="copyBtn">Copy current recipe</button>
    <div class="out" id="out"></div>
  </div>

<script>
  const root=document.documentElement;
  // knob id -> {css var, unit, format}
  const knobs=[
    {id:'draw',      var:'--draw',      unit:'s',  dp:2},
    {id:'wet-boost', var:'--wet-boost', unit:'',   dp:2},
    {id:'wet-width', var:'--wet-width', unit:'%',  dp:0},
    {id:'wet-lag',   var:'--wet-lag',   unit:'%',  dp:0},
    {id:'dry-delay', var:'--dry-delay', unit:'s',  dp:2},
    {id:'streak',    var:'--streak',    unit:'',   dp:2},
    {id:'streak-gap',var:'--streak-gap',unit:'px', dp:0},
    {id:'ragged',    var:'--ragged',    unit:'',   dp:1},
    {id:'skew',      var:'--skew',      unit:'%',  dp:1},
    {id:'overhang',  var:'--overhang',  unit:'em', dp:2},
  ];

  // seed sliders from the current computed CSS values
  function seed(){
    const cs=getComputedStyle(root);
    knobs.forEach(k=>{
      const raw=cs.getPropertyValue(k.var).trim();
      const num=parseFloat(raw);
      const el=document.getElementById(k.id);
      if(!isNaN(num)) el.value=num;
      apply(k);
    });
    document.getElementById('bubbles').checked =
      parseFloat(cs.getPropertyValue('--bubbles'))!==0;
  }
  function apply(k){
    const el=document.getElementById(k.id);
    const val=parseFloat(el.value).toFixed(k.dp);
    root.style.setProperty(k.var, val+k.unit);
    document.getElementById('v-'+k.id).textContent=val+k.unit;
    render();
  }
  knobs.forEach(k=>document.getElementById(k.id).addEventListener('input',()=>apply(k)));

  document.getElementById('bubbles').addEventListener('change',e=>{
    root.style.setProperty('--bubbles', e.target.checked?'1':'0'); render();
  });
  document.querySelectorAll('.swatches button').forEach(b=>
    b.addEventListener('click',()=>{ root.style.setProperty('--hl', b.dataset.color); }));

  // replay: SNAP back to the un-drawn state (transitions off), then on the next
  // frame turn transitions back on and add .go so the sweep animates fresh. Doing
  // the reset + re-fire in one synchronous block doesn't work — the removal itself
  // animates backward and fights the re-add. A frame gap (with transitions killed
  // during the reset) guarantees a clean zero-state to draw from.
  const samples=[...document.querySelectorAll('.sample')];
  function replay(){
    samples.forEach(s=>{
      s.style.transition='none';
      s.classList.remove('go');
      // also freeze the pseudo-element transitions during reset
      s.classList.add('resetting');
    });
    // force the reset to paint
    void document.body.offsetWidth;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      samples.forEach(s=>{
        s.style.transition='';
        s.classList.remove('resetting');
        s.classList.add('go');
      });
    }));
  }
  document.getElementById('replay').addEventListener('click',replay);

  // live recipe output (the CSS you'd paste into .mark)
  function render(){
    const cs=getComputedStyle(root);
    const g=v=>cs.getPropertyValue(v).trim();
    document.getElementById('out').textContent=
`/* recipe */
--draw:${g('--draw')};
--wet-boost:${g('--wet-boost')};
--wet-width:${g('--wet-width')};
--wet-lag:${g('--wet-lag')};
--dry-delay:${g('--dry-delay')};
--streak:${g('--streak')};
--streak-gap:${g('--streak-gap')};
--ragged:${g('--ragged')};
--skew:${g('--skew')};
--overhang:${g('--overhang')};
--bubbles:${g('--bubbles')};`;
  }
  document.getElementById('copyBtn').addEventListener('click',()=>{
    navigator.clipboard.writeText(document.getElementById('out').textContent);
    document.getElementById('copyBtn').textContent='Copied ✓';
    setTimeout(()=>document.getElementById('copyBtn').textContent='Copy current recipe',1200);
  });

  seed(); render();
  // auto-play once on load
  setTimeout(replay,300);
</script>
</body>
</html>
