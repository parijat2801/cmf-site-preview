<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Highlighter Shader Lab</title>
<style>
  :root{--ink:#231F20;--cream:#E7E1D4;--red:#DB1A21}
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--cream);
    font-family:"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;
    display:grid;grid-template-columns:1fr 330px;min-height:100vh}
  .stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:52px;padding:60px;position:relative}
  .stage h1{font-size:14px;letter-spacing:.2em;text-transform:uppercase;opacity:.5;font-weight:700;margin:0}
  .replay{position:absolute;top:24px;right:24px;background:none;border:1px solid rgba(231,225,212,.3);
    color:var(--cream);padding:.5em 1.1em;border-radius:4px;cursor:pointer;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .replay:hover{border-color:var(--cream)}

  /* .mark wraps the word; the shader canvas is positioned BEHIND the text, sized
     to the word's box. The text sits on top at full legibility. */
  .line{font-weight:800;letter-spacing:-.01em;font-size:clamp(2rem,5vw,3.4rem);white-space:nowrap}
  .mark{position:relative;display:inline-block;color:var(--cream);z-index:0;isolation:isolate}
  .mark > canvas{position:absolute;z-index:-1;pointer-events:none;
    /* the box extends a little past the word (ink overhang) — set in JS */}

  .note{font-family:'Caveat',cursive;color:var(--red);transform:rotate(-3deg);font-size:1.4rem;opacity:.9}

  .panel{background:#1a1718;border-left:1px solid rgba(231,225,212,.12);padding:22px;overflow-y:auto;font-size:13px;position:sticky;top:0;height:100vh}
  .panel h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.6;margin:0 0 16px}
  .ctl{margin-bottom:14px}
  .ctl label{display:flex;justify-content:space-between;margin-bottom:5px;opacity:.85}
  .ctl label b{font-weight:400;opacity:.6;font-variant-numeric:tabular-nums}
  .ctl input[type=range]{width:100%;accent-color:var(--red)}
  .swatches{display:flex;gap:8px;margin-bottom:16px}
  .swatches button{flex:1;height:30px;border:1px solid rgba(231,225,212,.2);border-radius:4px;cursor:pointer}
  .copy{margin-top:12px;width:100%;padding:.7em;background:var(--red);color:#fff;border:none;border-radius:5px;cursor:pointer;font-weight:700;letter-spacing:.06em}
  .out{margin-top:12px;background:#0f0d0e;border:1px solid rgba(231,225,212,.12);border-radius:6px;padding:12px;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;color:#9fd3a0}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <button class="replay" id="replay">▶ Replay draw</button>
    <h1>For Brands · quadrant label</h1>
    <div class="line">The <span class="mark" data-mark>Cultural Leaders</span> quadrant</div>
    <div class="note">If your brand isn't here, is it even culturally relevant?</div>
    <div class="line" style="font-size:1.7rem;opacity:.8">smaller: <span class="mark" data-mark>Made Real</span></div>
  </div>

  <div class="panel">
    <h2>Highlighter Shader</h2>
    <div class="swatches">
      <button style="background:#DB1A21" data-color="0.859,0.102,0.129" title="red"></button>
      <button style="background:#F5D547" data-color="0.961,0.835,0.278" title="yellow"></button>
      <button style="background:#4ea3ff" data-color="0.306,0.639,1.0" title="blue"></button>
      <button style="background:#5ed17a" data-color="0.369,0.820,0.478" title="green"></button>
    </div>

    <div class="ctl"><label>Draw speed (s) <b id="v-draw"></b></label><input type="range" id="draw" min="0.4" max="3" step="0.05" value="0.9"></div>
    <div class="ctl"><label>Wet brightness <b id="v-wet"></b></label><input type="range" id="wet" min="0" max="1.2" step="0.05" value="0.95"></div>
    <div class="ctl"><label>Wet band width <b id="v-wetw"></b></label><input type="range" id="wetw" min="0.02" max="0.4" step="0.01" value="0.02"></div>
    <div class="ctl"><label>Dry rate <b id="v-dry"></b></label><input type="range" id="dry" min="0.2" max="3" step="0.05" value="3"></div>
    <div class="ctl"><label>Tip raggedness <b id="v-tipr"></b></label><input type="range" id="tipr" min="0" max="0.06" step="0.002" value="0.006"></div>
    <div class="ctl"><label>Edge raggedness <b id="v-edge"></b></label><input type="range" id="edge" min="0" max="0.5" step="0.01" value="0"></div>
    <div class="ctl"><label>Ink streakiness <b id="v-streak"></b></label><input type="range" id="streak" min="0" max="1" step="0.02" value="0.78"></div>
    <div class="ctl"><label>Bubbles / skips <b id="v-bub"></b></label><input type="range" id="bub" min="0" max="1" step="0.02" value="0.4"></div>
    <div class="ctl"><label>Ink opacity <b id="v-alpha"></b></label><input type="range" id="alpha" min="0.4" max="1" step="0.02" value="0.68"></div>
    <div class="ctl"><label>Skew magnitude (random ±) <b id="v-skew"></b></label><input type="range" id="skew" min="0" max="0.1" step="0.005" value="0.05"></div>

    <button class="copy" id="copyBtn">Copy recipe</button>
    <div class="out" id="out"></div>
  </div>

<script type="module">
  import { ShaderMount } from './vendor/paper-shaders/index.js';
  import { simplexNoise } from './vendor/paper-shaders/shader-utils.js';

  /* ---- custom highlighter fragment shader ----
     Draws a marker stroke into a transparent canvas that sits behind one word.
     x∈[0,1] left→right, y∈[0,1] top→bottom (we flip y in GLSL).
     u_progress is the tip position; ink exists only left of it. The wet band
     trails just BEHIND the tip and fades as the ink dries. Streaks/bubbles come
     from simplex noise so every stroke differs and nothing is hand-placed. */
  const frag = `#version 300 es
  precision mediump float;
  uniform float u_time;
  uniform vec2  u_res;           // our OWN resolution uniform (mount owns u_resolution)
  uniform float u_progress;      // 0..1 tip position
  uniform vec3  u_color;
  uniform float u_alpha;         // base ink opacity
  uniform float u_wet;           // wet-edge brightness
  uniform float u_wetWidth;      // wet band width (in x, 0..1)
  uniform float u_streak;        // streak strength
  uniform float u_bubbles;       // skip/bubble amount
  uniform float u_tipRag;        // frontier wobble
  uniform float u_edgeRag;       // top/bottom edge wobble
  uniform float u_skew;          // slant
  uniform float u_seed;
  out vec4 fragColor;

  ${simplexNoise}

  void main(){
    vec2 uv = gl_FragCoord.xy / u_res.xy;
    uv.y = 1.0 - uv.y;
    // aspect so noise isn't stretched (word boxes are wide + short)
    float aspect = u_res.x / u_res.y;
    vec2 nuv = vec2(uv.x * aspect, uv.y);

    // ---- stroke body: a band in y, with ragged top/bottom edges ----
    float midTop = 0.12, midBot = 0.88;          // inset from box top/bottom
    // slant the band slightly (marker held at an angle)
    float slant = (uv.x - 0.5) * u_skew;
    float top = midTop + slant + u_edgeRag * 0.12 * snoise(vec2(uv.x*7.0 + u_seed, 1.3));
    float bot = midBot + slant - u_edgeRag * 0.12 * snoise(vec2(uv.x*6.0 + u_seed*1.7, 4.1));
    // soft antialiased band membership
    float body = smoothstep(top, top+0.03, uv.y) * (1.0 - smoothstep(bot-0.03, bot, uv.y));
    if(body <= 0.001){ fragColor = vec4(0.0); return; }

    // ---- reveal frontier: ink exists left of the (noise-wobbled) tip ----
    float tip = u_progress + u_tipRag * snoise(vec2(uv.y*5.0 + u_seed*2.3, u_progress*3.0));
    float inked = 1.0 - smoothstep(tip - 0.012, tip + 0.004, uv.x);   // 1 behind tip, 0 ahead
    if(inked <= 0.001){ fragColor = vec4(0.0); return; }

    // ---- ink texture: lengthwise streaks + density variation ----
    float streaks = 0.5 + 0.5 * snoise(vec2(uv.x*2.0, uv.y*46.0 + u_seed));
    float density = 1.0 - u_streak * (0.55 * streaks + 0.45 * (0.5+0.5*snoise(nuv*9.0 + u_seed)));
    density = clamp(density, 0.0, 1.0);

    // ---- bubbles / skips: noise thresholded holes ----
    float bub = snoise(nuv*14.0 + u_seed*3.1);
    float holes = 1.0 - u_bubbles * smoothstep(0.55, 0.78, bub);   // punch transparent spots
    holes = clamp(holes, 0.0, 1.0);

    float ink = u_alpha * body * inked * density * holes;

    // ---- wet leading edge: bright band trailing just behind the tip ----
    // distance behind the tip (positive = behind, over ink already laid)
    float behind = tip - uv.x;
    float wetBand = smoothstep(u_wetWidth, 0.0, behind) * step(0.0, behind); // 1 at tip → 0 at width back
    // fade the whole wet contribution out as the stroke nears completion (dries)
    float dryOut = 1.0 - smoothstep(0.9, 1.0, u_progress);
    float wet = u_wet * wetBand * dryOut * body * inked * holes;

    // brighter, whiter ink at the wet edge; base color elsewhere
    vec3 col = u_color;
    vec3 wetCol = mix(u_color, vec3(1.0), 0.55);
    col = mix(col, wetCol, clamp(wet, 0.0, 1.0));

    float outA = clamp(ink + wet*0.6, 0.0, 1.0);
    // premultiplied-ish output looks right over dark bg with normal blending
    fragColor = vec4(col, outA);
  }`;

  const P = {
    draw:0.9, wet:0.95, wetw:0.02, dry:3, tipr:0.006, edge:0,
    streak:0.78, bub:0.4, alpha:0.68, skew:-0.05, color:[0.859,0.102,0.129]
  };
  // per-stroke RANDOM skew so no two highlights tilt identically. Each mark keeps
  // its own value (stable across replays) — set once at build. Magnitude tracks
  // P.skew so the slider still governs how tilted strokes get overall.
  const skewFor = i => {
    // deterministic-ish spread from the index, in [-1,1], scaled to the skew range
    const r = Math.sin(i*127.1 + 3.7) * 43758.5453;
    const jitter = (r - Math.floor(r)) * 2 - 1;            // [-1,1)
    const mag = Math.max(0.02, Math.abs(P.skew));          // slider sets magnitude
    return +(jitter * mag).toFixed(4);
  };

  const OVERHANG = 6;   // px the canvas extends past the word L/R
  const VPAD = 8;       // px the canvas extends past the word top/bottom

  const marks=[];
  document.querySelectorAll('[data-mark]').forEach((el,i)=>{
    const seed = 1.0 + i*7.13;
    const skew = skewFor(i);          // this mark's own random tilt
    const mount=new ShaderMount(el, frag, uniforms(0, seed, null, skew), undefined, 0.0);
    const cv=el.querySelector('canvas');
    if(cv){
      cv.style.position='absolute'; cv.style.zIndex='-1'; cv.style.pointerEvents='none';
      cv.style.left=(-OVERHANG)+'px'; cv.style.top=(-VPAD)+'px';
      cv.style.width='calc(100% + '+(OVERHANG*2)+'px)';
      cv.style.height='calc(100% + '+(VPAD*2)+'px)';
    }
    marks.push({el, mount, seed, cv, skew});
  });

  function uniforms(progress, seed, cv, skew){
    const w = cv ? cv.width  : 300;
    const h = cv ? cv.height : 80;
    return {
      u_res:[w,h],
      u_progress:progress, u_color:P.color, u_alpha:P.alpha,
      u_wet:P.wet, u_wetWidth:P.wetw, u_streak:P.streak, u_bubbles:P.bub,
      u_tipRag:P.tipr, u_edgeRag:P.edge, u_skew:(skew!==undefined?skew:P.skew), u_seed:seed,
    };
  }

  // animate u_progress 0→1 over P.draw seconds via rAF (drives setUniforms)
  let raf=0, startT=0;
  function draw(now){
    if(!startT) startT=now;
    const t=(now-startT)/1000;
    const p=Math.min(1, t / P.draw);
    marks.forEach(m=>m.mount.setUniforms({...uniforms(p, m.seed, m.cv, m.skew)}));
    if(p<1) raf=requestAnimationFrame(draw);
  }
  function replay(){ cancelAnimationFrame(raf); startT=0; raf=requestAnimationFrame(draw); }
  document.getElementById('replay').addEventListener('click',replay);

  // live param updates (re-render current frame at full progress for tuning)
  function applyStatic(){ marks.forEach(m=>m.mount.setUniforms({...uniforms(1, m.seed, m.cv, m.skew)})); }

  const bind=id=>{ const el=document.getElementById(id); const set=()=>{
    P[id]=parseFloat(el.value); const l=document.getElementById('v-'+id); if(l)l.textContent=P[id];
    // skew slider sets the random MAGNITUDE → recompute each mark's own tilt
    if(id==='skew') marks.forEach((m,i)=>{ m.skew=skewFor(i); });
    render(); applyStatic();
  }; el.addEventListener('input',set); set(); };
  ['draw','wet','wetw','dry','tipr','edge','streak','bub','alpha','skew'].forEach(bind);

  document.querySelectorAll('.swatches button').forEach(b=>b.addEventListener('click',()=>{
    P.color=b.dataset.color.split(',').map(Number); applyStatic();
  }));

  function render(){
    document.getElementById('out').textContent=
`/* highlighter shader recipe */
draw:${P.draw}  wet:${P.wet}  wetWidth:${P.wetw}
dry:${P.dry}  tipRag:${P.tipr}  edgeRag:${P.edge}
streak:${P.streak}  bubbles:${P.bub}
alpha:${P.alpha}  skew:${P.skew}`;
  }
  document.getElementById('copyBtn').addEventListener('click',()=>{
    navigator.clipboard.writeText(document.getElementById('out').textContent);
    document.getElementById('copyBtn').textContent='Copied ✓';
    setTimeout(()=>document.getElementById('copyBtn').textContent='Copy recipe',1200);
  });

  render();
  addEventListener('resize',()=>marks.forEach(m=>m.place()));
  setTimeout(replay, 400);   // autoplay once
</script>
</body>
</html>
