backend:
  name: github
  repo: parijat2801/cmf-site-preview
  branch: main
  auth_endpoint: api/oauth
  # base_url: https://REPLACE-WITH-DEPLOYED-VERCEL-URL.vercel.app
  # set to the deployed Vercel URL

# Uploaded images land in assets/, referenced from content as "assets/...".
media_folder: "assets"
public_folder: "assets"

# Upload hygiene: phone photos arrive as multi-MB JPEG/HEIC — convert to WebP,
# cap dimensions (nothing on the page renders wider than ~1600px), cap file
# size, and slugify filenames (spaces/commas in names would break the
# comma-joined data-photos attribute and URLs).
media_libraries:
  default:
    config:
      max_file_size: 5242880
      slugify_filename: true
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 1800
          height: 1800
        svg:
          optimize: true

collections:
  - name: "content"
    label: "The page"
    files:
      - name: "settings"
        label: "Page order and visibility"
        file: "content/settings.json"
        format: json
        fields:
          - label: "Sections, in page order"
            name: "sections"
            widget: list
            hint: "The site is one long scrolling page. These are the middle sections, in the order visitors scroll through them (the opening hero and the footer are always first and last and aren't listed here). Drag to reorder. Turn off \"Shown on the page\" to hide a section while keeping its place in the order — but if a hidden section still has a menu link pointing to it, remove that link under \"The menu\" too, or the link will lead nowhere."
            fields:
              - label: "Section"
                name: "section"
                widget: select
                options:
                  - { label: "Manifesto", value: "manifesto" }
                  - { label: "Who are we building for?", value: "audience" }
                  - { label: "Misfits Brigade — the artist roster", value: "misfits" }
                  - { label: "Offerings — the three offering rows", value: "offerings" }
                  - { label: "Misfits Acts — the red projects section", value: "work" }
                  - { label: "For Brands", value: "for-brands" }
                  - { label: "We work with", value: "calling" }
              - { label: "Shown on the page", name: "visible", widget: boolean, default: true, hint: "On shows this section; off hides it while keeping its place, so turning it back on restores it exactly where it was." }

      - name: "site"
        label: "Browser tab and link previews"
        file: "content/site.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: string, hint: "The name shown on the browser tab and as the headline in search results." }
          - { label: "Description", name: "description", widget: text, hint: "One or two plain sentences describing the site. Used by search engines and shown under the title when the link is shared. Aim for about 150 characters." }
          - { label: "Web address", name: "url", widget: string, hint: "The site's own live web address, e.g. https://culturalmisfits.com. Leave as-is unless the address changes." }
          - { label: "Sharing preview image", name: "image", widget: image, hint: "The picture that appears when someone shares the site on social media or chat. Use a wide picture, a bit under twice as wide as tall (1.91:1, e.g. 1200 by 630) — anything narrower gets cropped." }
          - { label: "Site name", name: "siteName", widget: string, hint: "The brand name shown alongside the preview when the link is shared." }

      - name: "nav"
        label: "The menu"
        file: "content/nav.json"
        format: json
        fields:
          - { label: "Instagram address", name: "instagram", widget: string, hint: "The full web address of the Instagram profile the Instagram icon in the menu opens." }
          - label: "Menu links — desktop"
            name: "links"
            widget: list
            hint: "The links shown across the top bar on computer screens. Add, remove, or drag to reorder. Each needs a wording and a place on the page to jump to."
            fields:
              - { label: "Wording", name: "label", widget: string, hint: "The text visitors click, e.g. \"Offerings\"." }
              - label: "Jumps to"
                name: "href"
                widget: select
                hint: "The part of the page this link scrolls to. Pick a section, or \"Email\" to open the visitor's mail app. If you point a link at a section that's turned off under \"Page order and visibility\", the link goes nowhere — remove it or turn that section back on."
                options: &link_targets
                  - { label: "Top of the page (hero)", value: "#top" }
                  - { label: "Misfits Brigade (artists)", value: "#misfits" }
                  - { label: "Who are we building for?", value: "#audience" }
                  - { label: "Offerings (whole section)", value: "#offerings" }
                  - { label: "Offerings: Culturist Network row", value: "#culturist-network" }
                  - { label: "Offerings: IRL & Live row", value: "#irl-live" }
                  - { label: "Offerings: Film Studio row", value: "#film-studio" }
                  - { label: "Misfits Acts (red projects section)", value: "#work" }
                  - { label: "For Brands", value: "#for-brands" }
                  - { label: "We work with", value: "#calling" }
                  - { label: "Email (opens the visitor's mail app)", value: "mailto:hello@culturalmisfits.com" }
          - label: "Menu links — phone"
            name: "menuLinks"
            widget: list
            hint: "The links inside the pop-out menu on phones (the button with two lines). Usually the same set as the desktop links plus Contact. Add, remove, or drag to reorder."
            fields:
              - { label: "Wording", name: "label", widget: string, hint: "The text visitors tap, e.g. \"Contact\"." }
              - label: "Jumps to"
                name: "href"
                widget: select
                hint: "The part of the page this link scrolls to, or \"Email\" to open the mail app. Avoid pointing at a section that's turned off, or the link leads nowhere."
                options: *link_targets

      - name: "hero"
        label: "Opening screen (hero)"
        file: "content/hero.json"
        format: json
        fields:
          - label: "Opening statement, line by line"
            name: "lines"
            widget: list
            hint: "The big statement on the first screen visitors see. Each item is one line; they appear one after another as if typed out. Add, remove, or drag to reorder the lines."
            field:
              label: "Line"
              name: "line"
              widget: text
              hint: "One line of the opening statement. Some lines carry styling tags like <span>...</span> that colour a word — edit the wording but keep those \"<span>\" tags around the same words."
          - { label: "Scroll prompt wording", name: "scrollLabel", widget: string, hint: "The small word near the bottom of the first screen that invites visitors to scroll down, e.g. \"Scroll\"." }

      - name: "calling"
        label: "\"We work with\" section"
        file: "content/calling.json"
        format: json
        fields:
          - { label: "Heading", name: "heading", widget: text, hint: "The big heading for this section. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words." }
          - { label: "Intro paragraph", name: "intro", widget: text, hint: "The line of text under the heading, before the numbered questions." }
          - label: "The numbered questions"
            name: "items"
            widget: list
            hint: "The list of \"Are you a...?\" prompts, numbered automatically down the section. Add, remove, or drag to reorder — the numbers renumber themselves."
            fields:
              - { label: "Question", name: "question", widget: text, hint: "One question. Uses <b>...</b> and <i>...</i> tags to bold or slant words — edit the wording but keep those \"<b>\" and \"<i>\" tags around the same words." }
          - { label: "Line before the email", name: "writeLede", widget: string, hint: "The short prompt shown just before the email address, e.g. \"Write to us at\"." }
          - { label: "Contact email", name: "email", widget: string, hint: "The email address shown here; clicking it opens the visitor's mail app." }

      - name: "misfits"
        label: "Misfits Brigade (the artists)"
        file: "content/misfits.json"
        format: json
        fields:
          - { label: "Heading", name: "heading", widget: text, hint: "The big heading above the artist grid. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words." }
          - { label: "Intro line", name: "intro", widget: text, hint: "The line of text under the heading, before the grid of artist photos." }
          - label: "Artists"
            name: "items"
            widget: list
            hint: "One entry per artist. On the page they appear as a grid of photos (three across on phones) that turn colourful as you point at them; clicking a photo opens a pop-up with that artist's name, role, and bio. The grid is arranged by each artist's number, not by the order in this list, so set the numbers to control the layout."
            fields:
              - { label: "Photo", name: "photo", widget: image, hint: "The artist's portrait. Shown taller than wide (4:5) — a face centred in the frame works best." }
              - { label: "Name", name: "name", widget: string, hint: "The artist's name, shown on the photo and at the top of their pop-up." }
              - { label: "Role", name: "role", widget: string, hint: "A short craft label shown under the name, e.g. \"Dancer\", \"Singer\"." }
              - { label: "Number", name: "order", widget: string, hint: "A two-digit number like \"01\" or \"02\". This number sets the artist's position in the grid, so number the artists in the order you want them to appear." }
              - { label: "Bio", name: "bio", widget: text, hint: "The paragraph shown in the artist's pop-up. If you see odd codes like &#x27; standing in for an apostrophe, leave them as they are — they display correctly on the page." }

      - name: "offerings"
        label: "Offerings (the three rows)"
        file: "content/offerings.json"
        format: json
        fields:
          - { label: "Heading", name: "heading", widget: text, hint: "The big heading above the offering rows. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words." }
          - label: "Offering rows"
            name: "items"
            widget: list
            hint: "One entry per offering row on the page (today: Culturist Network, IRL & Live, Film Studio), each a block of photos beside a block of text. Add, remove, or drag to reorder."
            fields:
              - { label: "Section ID", name: "id", widget: string, hint: "A short private label for this row, used as its jump-to spot on the page, e.g. \"culturist-network\". Menu links point at these, so changing it will break any menu link aimed at this row. Best left alone unless you know which links to update." }
              - label: "Accent colour"
                name: "accentColor"
                widget: select
                hint: "The highlight colour used for this row's photo frame and details."
                options: &accent_palette
                  - { label: "Brand red", value: "var(--red)" }
                  - { label: "Yellow", value: "var(--yellow)" }
                  - { label: "Green", value: "var(--green)" }
                  - { label: "Blue", value: "var(--blue)" }
                  - { label: "Cream", value: "var(--cream)" }
                  - { label: "Ink (near-black)", value: "var(--ink)" }
                  - { label: "White", value: "var(--white)" }
              - label: "Photos in the row"
                name: "photos"
                widget: list
                hint: "The pictures beside this row's text; the page cycles through them one after another. These are separate from the pop-up pages below. Add, remove, or drag to reorder."
                field: { label: "Photo", name: "photo", widget: image, hint: "Shown as a square (equal width and height) on computers and slightly wide (4:3) on phones — keep the subject centred so it survives both crops." }
              - label: "\"Read more\" pop-up pages"
                name: "slides"
                widget: list
                required: false
                hint: "The pages of the pop-up that opens when a visitor clicks this row's \"Read more\" link — each page is one picture with its paragraphs, and visitors step through them with arrows. Separate from the row photos above. Leave this empty and the \"Read more\" link does nothing, so either fill it in or set the link below to jump somewhere instead."
                fields:
                  - { label: "Picture", name: "image", widget: image, hint: "The picture on this pop-up page. Shown as a square (equal width and height) — keep the subject centred." }
                  - label: "Paragraphs"
                    name: "paragraphs"
                    widget: list
                    required: false
                    hint: "The text on this pop-up page. Add one paragraph per item."
                    field: { label: "Paragraph", name: "paragraph", widget: text }
              - { label: "Title", name: "title", widget: string, hint: "The name of this offering, shown as the heading of the row's text block." }
              - { label: "Body text", name: "copy", widget: text, hint: "The paragraph describing this offering. Uses <b>...</b> tags to bold words — edit the wording but keep those \"<b>\" tags around the same words." }
              - { label: "Line before the partner list", name: "partnerLede", widget: string, required: false, hint: "The short lead-in shown above the bullet list, e.g. \"Partner with us to create:\". Leave blank if this row has no bullet list." }
              - label: "Bullet list"
                name: "partnerList"
                widget: list
                required: false
                hint: "The bullet points shown under the line above. Leave empty if this row doesn't use one. Add, remove, or drag to reorder."
                field: { label: "Bullet", name: "item", widget: string }
              - { label: "Link wording", name: "linkLabel", widget: string, hint: "The clickable text at the bottom of the row, e.g. \"Read more ↗\" or \"Explore ↗\"." }
              - label: "Link jumps to"
                name: "linkHref"
                widget: select
                hint: "Where the link scrolls to when \"Link scrolls the page\" below is on. Pick a spot on the page, or \"Email\". If instead you want the link to open this row's pop-up, choose the last option here and turn that setting off."
                options:
                  - { label: "Top of the page (hero)", value: "#top" }
                  - { label: "Misfits Brigade (artists)", value: "#misfits" }
                  - { label: "Who are we building for?", value: "#audience" }
                  - { label: "Offerings (whole section)", value: "#offerings" }
                  - { label: "Offerings: Culturist Network row", value: "#culturist-network" }
                  - { label: "Offerings: IRL & Live row", value: "#irl-live" }
                  - { label: "Offerings: Film Studio row", value: "#film-studio" }
                  - { label: "Misfits Acts (red projects section)", value: "#work" }
                  - { label: "For Brands", value: "#for-brands" }
                  - { label: "We work with", value: "#calling" }
                  - { label: "Email (opens the visitor's mail app)", value: "mailto:hello@culturalmisfits.com" }
                  - { label: "Nowhere — use this when the link opens the pop-up", value: "#" }
              - { label: "Link scrolls the page", name: "linkScroll", widget: boolean, hint: "On makes the link scroll to the spot chosen in \"Link jumps to\" above. Off makes the link open this row's \"Read more\" pop-up instead (fill in the pop-up pages first, or nothing happens)." }

      - name: "work"
        label: "Misfits Acts (red projects section)"
        file: "content/work.json"
        format: json
        fields:
          - { label: "Heading", name: "heading", widget: text, hint: "The big heading for the red projects section. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words." }
          - label: "Acts"
            name: "items"
            widget: list
            hint: "One entry per project on the red section (today: Ruhbaru, Jupiter Pe Juice), each a block of text beside a block of photos, with the sides alternating down the page. Add, remove, or drag to reorder."
            fields:
              - { label: "Title", name: "title", widget: string, hint: "The name of this project, shown as the heading of its text block." }
              - { label: "Body text", name: "copy", widget: text, hint: "The paragraph describing this project. Uses <b>...</b> tags to bold words — edit the wording but keep those \"<b>\" tags around the same words." }
              - { label: "Link wording", name: "linkLabel", widget: string, hint: "The clickable text under the text, e.g. \"Follow ↗\"." }
              - { label: "Link address", name: "linkHref", widget: string, hint: "The full web address the link opens (in a new tab), e.g. the project's Instagram page." }
              - label: "Photos"
                name: "photos"
                widget: list
                hint: "The pictures beside this project's text; the page cycles through them one after another. Add, remove, or drag to reorder."
                field: { label: "Photo", name: "photo", widget: image, hint: "Shown slightly wider than tall (5:4) — keep the subject centred." }
              - label: "Accent colour"
                name: "accentColor"
                widget: select
                hint: "The highlight colour used for this project's photo frame."
                options: *accent_palette

      - name: "for_brands"
        label: "For Brands section"
        file: "content/for_brands.json"
        format: json
        fields:
          - { label: "Heading", name: "heading", widget: text, hint: "The big heading for this section. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words." }
          - { label: "Chart up-the-side label", name: "chartYAxisLabel", widget: string, hint: "The label running up the left edge of the hand-drawn chart in this section (the vertical axis)." }
          - { label: "Chart along-the-bottom label", name: "chartXAxisLabel", widget: string, hint: "The label running along the bottom of the hand-drawn chart (the horizontal axis)." }
          - { label: "Alien picture description", name: "alienAlt", widget: string, required: false, hint: "A few words describing the small alien mark on the chart, read aloud by screen readers. Not shown on the page." }
          - { label: "Handwritten note on the chart", name: "note", widget: text, hint: "The short handwritten-style note that floats over the top-right of the chart, with a curly arrow pointing at the alien mark." }
          - { label: "Lead paragraph", name: "lead", widget: text, hint: "The opening paragraph of the text column beside the chart." }
          - label: "Bullet list"
            name: "list"
            widget: list
            hint: "The short bullet points shown under the lead paragraph. Add, remove, or drag to reorder."
            field: { label: "Bullet", name: "item", widget: string }
          - { label: "Line before the email", name: "writeLede", widget: string, hint: "The short prompt shown just before the email address, e.g. \"Write to us at\"." }
          - { label: "Contact email", name: "email", widget: string, hint: "The email address shown here; clicking it opens the visitor's mail app." }

      - name: "manifesto"
        label: "Manifesto section"
        file: "content/manifesto.json"
        format: json
        fields:
          - label: "Manifesto statements"
            name: "beats"
            widget: list
            hint: "The run of large statements that open the scroll, each a headline and paragraph beside a big photo, with the photo sitting left or right as you choose. Add, remove, or drag to reorder."
            fields:
              - { label: "Small label above", name: "eyebrow", widget: string, required: false, hint: "A small word shown above the headline, e.g. \"Manifesto\". Usually filled in for the first statement only and left blank for the rest." }
              - { label: "Headline", name: "headline", widget: text, hint: "The large statement. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words." }
              - { label: "Paragraph", name: "body", widget: text, hint: "The supporting line of text under the headline." }
              - { label: "Photo", name: "photo", widget: image, hint: "The photo beside this statement. Shown wider than tall (4:3)." }
              - { label: "Photo description", name: "alt", widget: string, required: false, hint: "A few words describing the photo, read aloud by screen readers. Not shown on the page." }
              - label: "Photo side"
                name: "side"
                widget: select
                hint: "Whether this statement's photo sits on the left or the right."
                options:
                  - { label: "Right", value: "r" }
                  - { label: "Left", value: "l" }
          - { label: "Closing line", name: "lede", widget: text, hint: "A short line shown after the statements, handing off to the next section." }

      - name: "audience"
        label: "Who are we building for? section"
        file: "content/audience.json"
        format: json
        fields:
          - { label: "Heading", name: "heading", widget: text, hint: "The big heading for this section. Carries styling tags like <span>...</span> that highlight a word — edit the wording but keep those \"<span>\" tags around the same words. (This section may be turned off under \"Page order and visibility\" — turn it on there to show it.)" }
          - label: "Audience cards"
            name: "types"
            widget: list
            hint: "The cards naming who the site is for, shown in a row that scrolls sideways. Add, remove, or drag to reorder."
            fields:
              - { label: "Photo", name: "photo", widget: image, hint: "The picture on the card. Shown wide, a little wider than a standard photo (about 16:10) — keep the subject centred." }
              - { label: "Title", name: "title", widget: string, hint: "The name of this audience, shown on the card." }
              - { label: "Question", name: "question", widget: string, hint: "The short question shown under the title on the card." }

      - name: "footer"
        label: "Footer"
        file: "content/footer.json"
        format: json
        fields:
          - { label: "About heading", name: "aboutHeading", widget: string, hint: "The heading of the short \"about\" blurb at the bottom of the page." }
          - { label: "About blurb", name: "aboutBlurb", widget: text, hint: "The short paragraph about the brand shown in the footer." }
          - label: "Footer links — first column"
            name: "homeLinks"
            widget: list
            hint: "The first column of links in the footer. Each needs wording and a spot on the page to jump to. Add, remove, or drag to reorder."
            fields:
              - { label: "Wording", name: "label", widget: string, hint: "The text visitors click." }
              - label: "Jumps to"
                name: "href"
                widget: select
                hint: "The part of the page this link scrolls to, or \"Email\". Avoid pointing at a section that's turned off, or the link leads nowhere."
                options: *link_targets
          - label: "Footer links — second column"
            name: "navLinks"
            widget: list
            hint: "The second column of links in the footer. Add, remove, or drag to reorder."
            fields:
              - { label: "Wording", name: "label", widget: string, hint: "The text visitors click." }
              - label: "Jumps to"
                name: "href"
                widget: select
                hint: "The part of the page this link scrolls to, or \"Email\". Avoid pointing at a section that's turned off, or the link leads nowhere."
                options: *link_targets
          - label: "Social links"
            name: "socialLinks"
            widget: list
            hint: "The links to social profiles in the footer. Add, remove, or drag to reorder."
            fields:
              - { label: "Wording", name: "label", widget: string, hint: "The name of the platform, e.g. Instagram, Facebook, Youtube." }
              - { label: "Profile address", name: "href", widget: string, hint: "The full web address of the profile, opened in a new tab." }
          - { label: "Copyright line", name: "copyright", widget: string, hint: "The small copyright text at the very bottom, e.g. \"© 2026 Cultural (Mis)fits\"." }
          - { label: "Tagline", name: "tagline", widget: string, hint: "The short sign-off line shown beside the copyright." }


